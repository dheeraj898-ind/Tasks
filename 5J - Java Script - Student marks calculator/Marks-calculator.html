<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            display:flex;
            flex-direction:column;
            align-items:center;
            background:#f4f4f4;
            font-family:Arial,sans-serif;
        }

.input{
    width:400px;
    padding:25px;
    background:white;
    border-radius:12px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    margin-top:50px;
}
button{
    margin: 5px;
    padding: 5px;
    border-radius: 5px;
    transition:0.3s;
    cursor: pointer;
    background-color: beige;
}
button:hover{
    background-color: grey;
    color: orange;
    transform:translateY(-2px);
}

#output{
    width:400px;
    min-height:200px;
    padding:25px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0px 0px 10px black;
    transition:0.4s;
}
    </style>
</head>
<body>

    <div class="input">
        <h1>Students Marks</h1>
        <p>Enter Subject name and Marks.</p>
        <label>Enter your NAME</label>
        <input id="name"><br><br>
        <label>Enter subject 1 Marks = </label>
        <input id="marks1"><br><br>
        <label>Enter subject 2 Marks = </label>
        <input id="marks2"><br><br>
        <button id="calculate">Calculate</button>
        <button id="reset">Reset</button>
    </div>

    <div id="output">
        <p id="demo"></p>
        <p id="demo1"></p>
    </div>


    <script>
        document.getElementById("calculate").onclick = function(){

            let name = document.getElementById("name").value;
            let mark1 = Number(document.getElementById("marks1").value);
            let mark2 = Number(document.getElementById("marks2").value);

            let total = mark1 + mark2 ;
            let average = total/2;
            
            let bonus = total;
            bonus += 10;

            let great = mark1 > mark2;
            let equal = mark1 === mark2;

            let bothgreat = mark1 > 35 && mark2 > 35;
            let onegreat = mark1 > 90 || mark2 > 90;

            let increase = mark1;
            increase ++;
            let decrease = mark2;
            decrease --;

            let result = average >=35 ? "pass" : "fail";


            document.getElementById("demo").innerHTML =
            "Result: " + "<br>" +
            "Name : " + name + "<br><br>" +
            "Total Marks : " + total + "<br>" +
            "Average Marks : " + average + "<br>" +
            "Bonus Marks : " + bonus + "<br>"+
            "Subject 1 Greater than Subject 2 : " + great + "<br>" +
            "Both Marks Equal : " + equal + "<br>" +
            "Both Subjects Above 35 : " + bothgreat + "<br>" +
            "At Least One Subject Above 90 : " + onegreat + "<br>" +
            "Subject 1 After Increment : " + increase + "<br>" +
            "Subject 2 After Decrement : " + decrease + "<br><br>" +
            "Result : " + result;

            
            if(average >=90){
                document.getElementById("demo1").innerHTML = "Grade A";
                document.getElementById("output").style.backgroundColor = "green";
            }
            else if(average >=70){
                document.getElementById("demo1").innerHTML = "Grade B";
                document.getElementById("output").style.backgroundColor = "gold";
            }
            else if(average >=50){
                document.getElementById("demo1").innerHTML = "Grade C";
                document.getElementById("output").style.backgroundColor = "purple";
            }
            else if(average >=35){
                document.getElementById("demo1").innerHTML = "Grade D";
                document.getElementById("output").style.backgroundColor = "yellow";
            }
            else{
                document.getElementById("demo1").innerHTML = "Grade E , You are Failed.";
                document.getElementById("output").style.backgroundColor = "red";
            }
        }
             document.getElementById("reset").onclick = function(){
                document.getElementById("name").value = "";
                document.getElementById("marks1").value = "";
                document.getElementById("marks2").value = "";
                document.getElementById("demo").innerHTML = "";
                document.getElementById("demo1").innerHTML = "";
                document.getElementById("output").style.backgroundColor = "";
            }
    </script>
</body>
</html>
