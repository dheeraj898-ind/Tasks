<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Chat</title>
    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: whitesmoke;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 400px;
            background: grey;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card h2 {
            text-align: center;
            padding: 15px;
            margin: 0;
            background: orange;
            color: white;
            font-size: 18px;
        }

        /* Answers area - scrollable */
        #chatbox {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            border-bottom: 1px solid #ccc;
        }

        #chatbox p {
            margin: 8px 0;
            font-size: 14px;
            color: white;
        }

        /* Input area at the bottom */
        .input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .input-area button {
            padding: 10px 18px;
            background: orange;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #357abd;
        }

        .clear-btn {
            padding: 10px 18px;
            background: orangered;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .clear-btn:hover {
            background: #bd3535;
        }

    </style>
</head>
<body>

    <div class="card">

        <h2>Welcome Buddy! </h2>

        <div id="chatbox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask something..." />
            <button onclick="getReply()">Search</button>
            <button class="clear-btn" onclick="clearChat()">Clear</button>
        </div>

    </div>

    <script>

        const API_KEY = "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";
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";

        async function getReply() {
            
            const question = document.getElementById("userInput").value.trim();
            const chatbox = document.getElementById("chatbox");

            
            chatbox.innerHTML += "<p><b>DHEERAJ:</b> " + question + "</p>";
            
            document.getElementById("userInput").value = "";
            
            try{
                
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-3.5-turbo",
                        messages: [ { role: "user", content: question }]
                    })
                });
                
                const data = await response.json();
                
                chatbox.innerHTML += "<p><b>AI:</b> " + data.choices[0].message.content + "</p>";
            }
            
            catch(error){
                
                chatbox.innerHTML += "<p><b>AI:</b> Sorry! Something went wrong. Please try again.</p>";
                console.log(error);
            }  
            
        }
        
        function clearChat(){
            document.getElementById("chatbox").innerHTML = "";
        }
        
    </script>

</body>
</html>
