<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

<!-- -------------------------------Slice--------------- -->
    <script>
        let str = "DheerajReddy";
        console.log(str.slice(0, 7));

        let str1 = "DheerajReddy";
        console.log(str1.slice(7));
    </script>

    <!-- ----------------------------------------------substring---------- -->

    <script>
        let str2 = "DheerajReddy";
        console.log(str2.substring(0, 7));

        let str3 = "DheerajReddy";
        console.log(str3.substring(7, 12));
    </script>

    <!-- ---------------------------------------replace-------------- -->

    <script>
        let str4 = "DheerajReddy";
        console.log(str4.replace("Reddy", "Kumar"));

        let str5 = "My name is Dheeraj";
        console.log(str5.replace("Dheeraj", "Dinesh"));
    </script>

    <!-- ----------------------------------------------replaceAll--------------- -->

    <script>
        let str6 = "Dheeraj Dheeraj Dheeraj";
        console.log(str6.replaceAll("Dheeraj", "Dinesh"));

        let str7 = "HTML HTML HTML";
        console.log(str7.replaceAll("HTML", "CSS"));
    </script>

    <!-- -------------------------------------------------toUpperCase-------------------- -->

    <script>
        let str8 = "DheerajReddy";
        console.log(str8.toUpperCase());

        let str9 = "DINESH";
        console.log(str9.toUpperCase());
    </script>

    <!-- -------------------------------------------toLowerCase---------------------- -->

    <script>
        let str10 = "DHEERAJREDDY";
        console.log(str10.toLowerCase());

        let str11 = "DINESH";
        console.log(str11.toLowerCase());
    </script>

    <!-- -------------------------------------------concat------------------- -->

    <script>
        let firstName = "Dheeraj";
        let lastName = "Reddy";
        console.log(firstName.concat(lastName));

        let a = "Hello ";
        let b = "Dinesh";
        console.log(a.concat(b));
    </script>

    <!-- -----------------------------------------trim--------------------- -->

    <script>
        let str12 = "   DheerajReddy   ";
        console.log(str12.trim());

        let str13 = "   Hello Dinesh   ";
        console.log(str13.trim());
    </script>

    <!-- -----------------------------------------------trimStart------------------ -->

    <script>
        let str14 = "   Dheeraj";
        console.log(str14.trimStart());

        let str15 = "   Reddy";
        console.log(str15.trimStart());
    </script>

    <!-- ----------------------------------------------------trimEnd--------------- -->

    <script>
        let str16 = "Dheeraj   ";
        console.log(str16.trimEnd());

        let str17 = "Reddy   ";
        console.log(str17.trimEnd());
    </script>

    <!-- ------------------------------------------------charAt------------------------- -->

    <script>
        let str18 = "Dheeraj";
        console.log(str18.charAt(0));

        let str19 = "Dheeraj";
        console.log(str19.charAt(3));
    </script>

    <!-- ---------------------------------------------------charCodeAt----------------- -->

    <script>
        let str20 = "Dheeraj";
        console.log(str20.charCodeAt(0));

        let str21= "Reddy";
        console.log(str21.charCodeAt(0));
    </script>

    <!-- ---------------------------------------------split-------------------------- -->

    <script>
        let str22 = "HTML,CSS,JS";
        console.log(str22.split(","));

        let str23 = "Dheeraj Reddy";
        console.log(str23.split(" "));
    </script>

    <!-- --------------------------------------indexOf--------------------------- -->

    <script>
        let str24 = "DheerajReddy";
        console.log(str24.indexOf("R"));

        let str25 = "Dinesh Reddy";
        console.log(str25.indexOf("M"));
    </script>
</body>
</html>
