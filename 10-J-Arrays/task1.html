    <script>

        const movies =[
            {id: 1, title: "Bahubali", rating: 9},
            {id: 2, title: "Pushpa", rating: 8},
            {id: 3, title: "RRR", rating: 10},
            {id: 4, title: "Salaar", rating: 7}
        ];

        const movieTitles = movies.map(movie => movie.title);
        console.log(movieTitles);

        const movieRatings = movies.map(xyz => xyz.rating);
        console.log(movieRatings);

        const updatedRatings = movies.map(movie => (movie.rating + 1));
        console.log(updatedRatings);

        const highRatedMovies = movies.filter(movie => movie.rating > 8);
        console.log(highRatedMovies);

        const lowRatedMovies = movies.filter(movie => movie.rating < 9);
        console.log(lowRatedMovies);

        const movieById = movies.find(movie => movie.id === 3);
        console.log(movieById);

        const pushpaMovie = movies.find(movie => movie.title === "Pushpa");
        console.log(pushpaMovie);

        const totalRatings = movies.reduce((total, movie) => total + movie.rating, 0);
        console.log(totalRatings);
    </script>



     


    <script>

        const products =[
            {id: 1, name: "Laptop", price: 50000},
            { id: 2, name: "Mouse", price: 500 },
            { id: 3, name: "Keyboard", price: 1500 },
            { id: 4, name: "Monitor", price: 12000 }
        ];


        const productNames = products.map(names => names.name);
        console.log(productNames);

        const productPrices = products.map(names => names.price);
        console.log(productPrices);

        const priceIncrease = products.map(names => names.price + 1000);
        console.log(priceIncrease);

        const highPrice = products.filter(names => names.price >1000);
        console.log(highPrice);

        const lowPrice = products.filter(names => names.price < 10000);
        console.log(lowPrice);

        const equal = products.find(names => names.id === 2);
        console.log(equal);

        const nameEqual = products.filter(names => names.name === "Monitor");
        console.log(nameEqual);

        const totalProducts = products.reduce((total,names) => total + names.price ,0);
        console.log(totalProducts);
    </script>




    <script>

        const scores = [45, 80, 20, 100, 60];

        const addTenRuns = scores.map(score => score + 10);
        console.log(addTenRuns);

        const addFiveRuns = scores.map(score => score + 5);
        console.log(addFiveRuns);

        const scoreAbove80 = scores.filter(score => score > 50);
        console.log(scoreAbove80);

        const scoresAbove80 = scores.filter(score => score >= 80);
        console.log(scoresAbove80);

        const result = scores.find(score => score > 70);
        console.log(result);

        const score100 = scores.find(score => score === 100);
        console.log(score100);

        const totalRuns = scores.reduce((total, score) => total + score, 0);
        console.log(totalRuns);

        const average = totalRuns / scores.length;
        console.log(average);
    </script>



     
    <script>

    <script>
    
    
    const upperMovies = movies.map(movie => movie.title.toUpperCase());
    console.log(upperMovies);
    
    const lowerProducts = products.map(product => product.name.toLowerCase());
    console.log(lowerProducts);

    const expensiveProduct = products.reduce((max, product) => product.price > max.price ? product : max);
    console.log(expensiveProduct);
    
    const highestScore = scores.reduce((max, score) =>score > max ? score : max);
    console.log(highestScore);

    const topper = students.reduce((max, student) =>student.marks > max.marks ? student : max);
    console.log(topper);
    
    const bestMovie = movies.reduce((max, movie) =>movie.rating > max.rating ? movie : max);
    console.log(bestMovie);
