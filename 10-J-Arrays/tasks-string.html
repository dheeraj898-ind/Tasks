    <!-- ----------------------------Count Vowels in a String---------------------->

    <script>
        let str = "Dheeraj Reddy";

        let count =0;

        for(i=0; i<str.length; i++){
            if( str[i] === "a" || str[i] === "e" || str[i] === "i" || str[i] === "o" || str[i] === "u"){
                count++
            }
        }
        console.log(count);

    </script>
