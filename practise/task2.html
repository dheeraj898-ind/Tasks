
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Card Animation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    background:#0f172a;
    font-family:Arial, Helvetica, sans-serif;
}

/* COMMON CARD */

.card{
    width:320px;
    height:220px;
    padding:30px;
    color:#fff;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:0.5s ease;
}

.card h2{
    font-size:32px;
    margin-bottom:15px;
    position:relative;
    z-index:2;
}

.card p{
    line-height:1.6;
    font-size:15px;
    position:relative;
    z-index:2;
}

/* ========================= */
/* FIRST CARD */
/* ========================= */

.first{
    background:linear-gradient(135deg,#ff6b6b,#ff9966);
    border-radius:20px;
}

.first::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(135deg, pink, orange);
    clip-path:polygon(0 0,35% 0,60% 50%,35% 100%,0 100%);
    transition:0.3s ease ;
}

.first:hover::before{
    animation: move 1s linear infinite;
    left:100%;
}
@keyframes move{
    from{
        top: 0;
        left: -100%;
    }
    to{
        top: 0;
        left: 100%;
    }
}

.first:hover{
    transform:translateY(-10px);
}

/* ========================= */
/* SECOND CARD */
/* ========================= */

.second{
    background:linear-gradient(135deg,#7f5af0,#2cb67d);
    border-radius:70px 0 70px 0;
    
}

/* HOVER CUT */

.second:hover{
    animation: moves 1s linear infinite alternate;
    transform:translateY(-10px);
    
}
@keyframes moves{
    from{
        border-radius:70px 0 70px 0; 
        background: linear-gradient(90deg, orange, red);
    }
    to{
        border-radius:0 70px 0 70px;
        background: linear-gradient(-90deg, orange, red);
    }
}
</style>
</head>

<body>

<div class="card first">
    <h2>Creative UI</h2>
    <p>
        Stylish moving skew cut animation effect on hover.
    </p>
</div>

<div class="card second">
    <h2>Modern Card</h2>
    <p>
        Border radius changes diagonally with smooth transition.
    </p>
</div>

</body>
</html>
