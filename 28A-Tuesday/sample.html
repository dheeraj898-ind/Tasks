   <style>
    body{
        background: #f5f5f5;;

    .navbar{
        display:flex;
        justify-content: space-between;
        align-items: center;
        padding:20px 60px;
    }
    .logo{
        font-size:20 px;
        font-weight:bold;
        color:blueviolet;
    }
    .nav-links{
        text-decoration: none;
        margin: left 35px;
        color:aqua;
        font-size: 20px;
    }
    .container{
        display:flex;
        justify-content: space-between;
        align align-items:center ;

    }
    .left{
        width:50%;
    }
    .left h1{

        color:aqua;
        margin-bottom: 30px;
    }
    .progress{

    }
    .progress p {
  font-size: 14px;
  margin-bottom: 5px;
  color: #555;
}

.bar {
  width: 100%;
  height: 6px;
  background: #ddd;
  border-radius: 5px;
}

.fill {
  height: 100%;
  border-radius: 5px;
}

.fill.blue { width: 70%; background: #5a8dee; }
.fill.dark { width: 97%; background: #3d5afe; }
.fill.orange { width: 92%; background: #ff7a59; }
.fill.light { width: 65%; background: #7aaeff; }

.right {
  width: 45%;

  text-align: center;
}

.right img {
  width: 300px;
  border-radius: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

@media (max-width: 900px) {
  .container {
    flex-direction: column;
    text-align: center;
  }

  .left, .right {
    width: 100%;
  }

  .right img {
    margin-top: 30px;
  }
}

   </style>

                    </div>
                </div>
                <div class="progress">
