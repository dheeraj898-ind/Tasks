<!DOCTYPE html>
<html>
<head>
    
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            background: whitesmoke;
            font-family: Arial, sans-serif;
        }
        .container{
            width: 300px;
            background: white;
            border-radius: 20px;
            text-align: center;
            padding: 20px;
            box-shadow: 10px 10px 15px rgba(0,0,0,0.1);
        }
        .image img{
            margin-top: 30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid blue;
        }
        .content h2{
            margin: 10px 0 5px;
        }
        .following{
            display: flex;
            justify-content: space-around;
        }
       
        .followers p{
            margin: 5px 0 0;
            font-size: 14px;
            color: gray;
        }
        button{
            width: 100%;
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(180deg, lightblue, blue);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.4s;
        }
        button:hover{
            transform: scale(1.1);
        }

    </style>
</head>
<body>
    <center>
    <div class="container">
            <div class="image">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/035/930/970/small_2x/ai-generated-portrait-of-a-cute-little-boy-in-green-sweater-on-green-background-photo.jpg" alt="image1">
            </div>
            <div class="content">
                <h2>Dheeraj</h2>
                <p>VLSI PD Engineer</p>
            </div>
            <hr>
        <div class="following">
            <div class="followers">
                <h3>1.2k</h3>
                <p>Followers</p>
            </div>
            <div class="followers">
                <h3>500</h3>
                <p>Following</p>
            </div>
            <div class="followers">
                <h3>40</h3>
                <p>Projects</p>
            </div>
        </div>
        <hr>
        <button>Follow User</button>
    </div>
    </center>
    
    

    
</body>
</html>
