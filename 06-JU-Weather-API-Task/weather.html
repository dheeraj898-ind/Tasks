<!DOCTYPE html>
<html lang="en">

<head>
    <title>Weather</title>
    <style>

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2f2f2;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        }

        .card {
            width: 300px;
            padding: 20px;
            background: white;
            text-align: center;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }

        button:hover {
            background: #357abd;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

    </style>
</head>

<body>

    <div class="card">

        <h2>Weather App</h2>
        <input type="text" id="city" placeholder="Enter City Name" />
        <button onclick="getWeather()">Search</button>
        <div id="result"></div>
    </div>

    <script>

        const API_KEY = "9e13c08bf85b007572e07d29d9a574e0";
        

        async function getWeather() {

            const city = document.getElementById("city").value.trim();

            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;

            const response = await fetch(url);
            const data = await response.json();

            if(data.cod == 200){
                
                let result = document.getElementById("result");
                
                result.innerHTML = "Temperature : " + data.main.temp + " °C <br>";
                result.innerHTML += "Humidity : " + data.main.humidity + "% <br>";

                let temp = data.main.temp;
                
                let card = document.querySelector(".card");
                
                if(temp < 20){
                    card.style.background = "lightgreen";
                }
                else if(temp < 25){
                    card.style.background = "Orange";
                }
                else{
                     card.style.background = "red";
                }
            }
            else{document.getElementById("result").innerText ="City Not Found";

            }
        }

    </script>

</body>
</html>
