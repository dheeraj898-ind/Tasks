<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- ----------------------------------EVEN------------------------- -->

    <script>
        let x=0;
        for(x=0; x<=10; x++){
            if(x % 2 ==0){
                console.log(x);
            }
        }
    </script>

    <!-- ----------------------------------ODD------------------------- -->

     <script>
        let x1=0;
        for(x1=0; x1<=10; x1++){
            if(x1 % 2 !==0){
                console.log(x1);
            }
        }
    </script>

    
    <!-- ----------------------------------Factorial------------------------- -->

     <script>

        let i =1;
        for(i = 1; i <= 10; i++){
            console.log("5 x " + i + " = " + (5 * i));
        }
     </script>
    

    <!-- ----------------------------------SUM OF NUMBERS.------------------------- -->


    <script>
    
        let sum = 0;
        
        for(let i = 1; i <= 10; i++){
            sum = sum + i;
            console.log(sum);
        }
</script>
</body>
</html>
