    <div class="container">

        <div class="scroll-container">

    <div class="scroll-text">
        **** JavaScript Quiz **** HTML Quiz **** CSS Quiz **** JavaScript Quiz **** HTML Quiz **** CSS Quiz ****
    </div>

</div>
        <div id="welcome-screen">
            <h1>JavaScript Quiz</h1>
            <p>Test your JavaScript knowledge with 10 multiple choice questions.</p>
            <h3>Total Questions : 10</h3>
            <button id="start-btn">Start Quiz</button>
        </div>



        <!-- Quiz Screen -->

        <div id="quiz-screen">
            <h3 id="question-number">Question 1 of 10</h3>
            <div id="timer">
                Time 
            </div>
            <h2 id="question">Question Here </h2>

            <div id="options">
            </div>

            <div class="buttons">
                <button id="prev-btn">Previous</button>
                <button id="next-btn">Next</button>
                <button id="submit-btn">Submit Quiz</button>
            </div>
        </div>



        <!-- Result Screen -->

        <div id="result-screen">
            <h1>Quiz Completed!</h1>
            <h2 id="score"></h2>
            <h3 id="correct"></h3>
            <h3 id="wrong"></h3>
            <h3 id="percentage"></h3>
            <h3 id="message"></h3>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>
