<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("https://as2.ftcdn.net/v2/jpg/05/25/21/49/1000_F_525214933_H10l8nxN0KesOGwRfIfszGkT1iCLmNsD.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        body::before{
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            top: 0;
            left: 0;
        }
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1, h3, .apply{
            position: relative;
        }
        h1{
            color:blue;
            margin-top: 30px;
        }
        h3{
            color: red;
            margin-bottom: 20px;
        }
        .apply{
            width: 60%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            background: linear-gradient(to right, pink, orange);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .apply h2{
            text-align: center;
            margin-bottom: 20px;
    }
    input, select, textarea{
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    .mobile input{
        width: 100%;
    }
    .options{
        display: flex;
        gap: 20px;
    }
    .options select,.options input{
        width: 50%;
    }
    .upload{
        border: 2px dashed #999;
        padding: 20px;
        text-align: center;
    }
    .click{
        gap: 20px;
        margin-top: 20px;
        text-align: center;
    }
    button{
        padding: 10px 25px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
    }
    button:hover{
        background-color: grey;
        color: orange;
        transform: scale(1.1);
        transition: 0,3s;
    }
        </style>
</head>

<body>
    <h1>Registration Form</h1>
    <h3><i>Apply Now</i></h3>
    <div class="apply">
        <h2>Job Application</h2>
        <form>
            <div class="name">
                <label>Name: </label><br>
                <input type="text" placeholder="First Name" required>
                <input type="text" placeholder="Last Name" required>
            </div>

            <div class="location">
                <label>Location: </label><br>
                <input type="text" placeholder="Current Location">
                <input type="text" placeholder="Preferred Location">
            </div>

            <div class="mobile">
                <label>Mobile No: </label><br>
                <input type="tel" placeholder="Phone">
                <label>Email: </label><br>
                <input type="email" placeholder="Email" required>
            </div>

            <div class="intrest">
                <p>Areas of Interest:</p>
                <label><input type="checkbox"> Technical</label>
                <label><input type="checkbox"> Non-Technical</label>
            </div>

            <div class="options">
                <select>
                    <option>Skill Level</option>
                    <option>Beginner</option>
                    <option>Intermediate</option>
                    <option>Advanced</option>
                </select>

                <input type="text" placeholder="Preferred Domain">
            </div>
            <fieldset>
                <legend>Cover Letter</legend>
                <textarea class="suggestions" placeholder="Please fill your comments..."></textarea>
            </fieldset>

            <div class="resume">
                <p>Resume:</p>
                <div class="upload">
                    Upload Your File
                    <br><br>
                    <input type="file">
                </div>
            </div>
            
            <div class="click">
            <button onclick="alert('Application Submitted! Thank You.')"type="submit">Submit</button>
            <button onclick="alert('You can Fill Now')" type="reset">Reset</button>
            </div>


        </form>
    </div>

</body>
</html>
