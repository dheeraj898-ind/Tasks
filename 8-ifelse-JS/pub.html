<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    
    
    <h2>Entry pass Using AND operator</h2>
    <label>Do you have ID: </label><br>
    <input id="id" placeholder="YES/NO"><br><br>
    <label>Enter your age: </label><br>
    <input id="age" placeholder="Enter your AGE"><br><br>
    <label>Do you have Ticket: </label><br>
    <input id="ticket" placeholder="YES?NO"><br><br>
    <button id="click">Click</button>
    <p id="demo"></p>

    <script>
        document.getElementById("click").onclick = function(){
            let id = document.getElementById("id").value;
            let age = Number(document.getElementById("age").value);
            let ticket = document.getElementById("ticket").value;

            if(id === "yes" && ticket === "yes" && age >= 18){
                document.getElementById("demo").innerHTML = "You can Enter";
            }
            else{
                document.getElementById("demo").innerHTML = "You cannot ENTER";
            }
        }
    </script>

    


<hr>



    <h2>Welcome</h2>
    <label>Enter a Number</label>
    <input id="number">
    <button id="clickk">CLICK</button>
    <p id="demo1"></p>

    <script>

        document.getElementById("clickk").onclick = function(){
            let month = Number(document.getElementById("number").value);

            switch (month){
                case 1:
                    document.getElementById("demo1").innerHTML = "January";
                    break;
                case 2:
                    document.getElementById("demo1").innerHTML = "Febrauary";
                    break;
                case 3:
                    document.getElementById("demo1").innerHTML = "March";
                    break;
                case 4:
                    document.getElementById("demo1").innerHTML = "April";
                    break;
                case 5:
                    document.getElementById("demo1").innerHTML = "May";
                    break;
                case 6:
                    document.getElementById("demo1").innerHTML = "June";
                    break;
                case 7:
                    document.getElementById("demo1").innerHTML = "July";
                    break;
                case 8:
                    document.getElementById("demo1").innerHTML = "August";
                    break;
                case 9:
                    document.getElementById("demo1").innerHTML = "September";
                    break;
                case 10:
                    document.getElementById("demo1").innerHTML = "October";
                    break;
                case 11:
                    document.getElementById("demo1").innerHTML = "November";
                    break;
                case 12:
                    document.getElementById("demo1").innerHTML = "December";
                    break;
                default:
                    document.getElementById("demo1").innerHTML = "Invalid.";
                
            }
        }
    </script>
</body>
</html>
