      <!-- Using SWITCH -->

      <script>
        let month = "January";
        
        switch (month){
            
            case "January":
            case "February":
            case "March":
                console.log("Summer Season");
                break;
                
            case "April":
            case "May":
            case "June":
            case "July":
                console.log("Rainy Season");
                break;
                
            case "August":
            case "September":
            case "October":
            case "November":
            case "December":
                console.log("Winter Season");
                break;
                
            default:
                console.log("Invalid Month");
        }
      </script>
