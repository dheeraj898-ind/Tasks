<!DOCTYPE html>
<html>

<head>
    <title> Pizza </title>
    <link rel="stylesheet" href="Pizza.css">
</head>

<body>

    <div class="container">
        <div class="left">
            <h1>"BUILD YOUR SMART PIZZA"</h1>
            <h3>CRUST</h3>
            <select id="crust">
                <option value="thin">Thin ($8)</option>
                <option value="regular">Regular ($10)</option>
                <option value="stuffed">Stuffed ($12)</option>
            </select>

            <h3>SIZE</h3>
            <button onclick="selectSize('small')">Small</button>

            <button onclick="selectSize('medium')">Medium</button>

            <button onclick="selectSize('large')">Large</button>

            <h3>TOPPINGS</h3>

            <input type="checkbox" value="cheese"> Cheese

            <input type="checkbox" value="mushrooms">Mushrooms<br><br>

            <input type="checkbox" value="peppers">Peppers

            <input type="checkbox" value="pepperoni">Pepperoni<br><br>

            <input type="checkbox" value="chicken">Chicken<br><br>

            <button onclick="generateBill()">Place Order</button>
            <button onclick="clearBill()">Clear</button>
        </div>

        <div class="right" id="receiptBox">
            <h1>Receipt</h1>
            <h3 id="pizzaName"></h3>
            <p id="basePrice"></p>
            <p id="toppingsPrice"></p>
            <p id="subtotal"></p>
            <p id="discount"></p>
            <h2 id="finalTotal"></h2>
        </div>
    </div>
    <script src="Pizza.js"></script>
</body>

</html>
