<!DOCTYPE html>
<html>

<head>
    <title>Random Color Card</title>
    <style>
        body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to right, beige, white) ;
}

#card{
    width: 400px;
    height: 220px;
    padding: 20px;
    text-align: center;
    border: 2px solid black;
    border-radius: 10px;
    background-color: grey;
}
#card h2{
    font-size: 30px;
}
button{
    margin-top: 30px;

    padding: 10px;
    border-radius: 5px;
    background-color: orange;
    color: black;
    cursor: pointer;
}
    </style>
</head>

<body>

    <div id="card">
        <h2 id="heading">Welcome</h2>

        <button onclick="changeCardColor()">
            Change Card Color
        </button>

        <button onclick="changeHeadingColor()">
            Change Heading Color
        </button>

        <button onclick="resetCard()">
            Reset
        </button>
    </div>

    <script>


let Time;

function changeCardColor(){
    const colors =["#1ABC9C","#9B59B6", "#3498DB",  "#E67E22", "#2ECC71" ];
    clearInterval(Time);

    Time = setInterval(function(){
        let card = document.getElementById("card");
        
        let randomIndex = Math.floor(Math.random() * colors.length);

        card.style.backgroundColor =colors[randomIndex];
    },500);
    
}

function changeHeadingColor(){

    let heading = document.getElementById("heading");
    const colors =["red","blue","green","yellow","pink"];
    let randomIndex = Math.floor(Math.random() * colors.length);
    
    heading.style.color = colors[randomIndex];
}

function resetCard(){

    clearInterval(Time);
    let card = document.getElementById("card");
    let heading = document.getElementById("heading");
    card.style.backgroundColor = "white";
    heading.style.color = "black";
}
    </script>

</body>

</html>
